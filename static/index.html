<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPSphere</title>
<link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%236366f1'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='monospace'>V</text></svg>">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface2: #1c1c1f;
  --border: #27272a;
  --text: #e4e4e7;
  --text2: #a1a1aa;
  --text3: #71717a;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
a { color: var(--accent2); text-decoration: none; }

/* ─── Login ─────────────────── */
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; width: 380px; text-align: center; }
.login-card h1 { font-size: 24px; margin-bottom: 4px; }
.login-card p  { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
.login-card input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
.login-card input:focus { border-color: var(--accent); }
.login-card button { width: 100%; margin-top: 12px; padding: 10px; border: none; border-radius: var(--radius); background: var(--accent); color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
.login-card button:hover { background: var(--accent2); }
.login-card .error { color: var(--red); font-size: 13px; margin-top: 8px; }

/* ─── Layout ────────────────── */
.app-layout { display: flex; height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; flex-shrink: 0; }
.sidebar .logo { font-size: 18px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
.sidebar .logo span { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
.sidebar nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sidebar nav a {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: var(--radius); color: var(--text2); font-size: 14px; cursor: pointer;
  transition: background .15s, color .15s;
}
.sidebar nav a:hover { background: var(--surface2); color: var(--text); }
.sidebar nav a.active { background: var(--accent); color: white; }
.sidebar nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer { border-top: 1px solid var(--border); padding-top: 12px; }
.sidebar-footer button { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; }
.sidebar-footer button:hover { background: var(--surface2); color: var(--text); }
.main-content { flex: 1; overflow-y: auto; padding: 24px 32px; }
.panel { display: none; }
.panel.active { display: block; }

/* ─── Dashboard ─────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.stat-card .label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.stat-card .bar { margin-top: 12px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.stat-card .bar .fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
.fill.green  { background: var(--green); }
.fill.yellow { background: var(--yellow); }
.fill.red    { background: var(--red); }
.fill.accent { background: var(--accent); }
.dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.dashboard-header h2 { font-size: 20px; font-weight: 600; }
.dashboard-header span { font-size: 13px; color: var(--text3); }

/* ─── Files ─────────────────── */
.files-toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.files-toolbar button { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.files-toolbar button:hover { background: var(--surface2); }
.files-toolbar button.danger { border-color: var(--red); color: var(--red); }
.files-toolbar button.danger:hover { background: rgba(239,68,68,.1); }
.files-toolbar .spacer { flex: 1; }
.files-breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 14px; margin-bottom: 12px; color: var(--text2); }
.files-breadcrumb a { color: var(--text2); cursor: pointer; }
.files-breadcrumb a:hover { color: var(--text); }
.files-breadcrumb span { color: var(--text3); }
.files-table { width: 100%; border-collapse: collapse; }
.files-table th { text-align: left; font-size: 12px; color: var(--text3); padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.files-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
.files-table tr:hover td { background: var(--surface); }
.files-table .name { cursor: pointer; display: flex; align-items: center; gap: 8px; }
.files-table .name:hover { color: var(--accent2); }
.files-table .name svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--text3); }
.files-table .size, .files-table .modified { color: var(--text2); font-size: 13px; }
.files-table input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
.upload-area { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 40px; text-align: center; color: var(--text2); margin-top: 16px; cursor: pointer; transition: border-color .2s; }
.upload-area:hover { border-color: var(--accent); color: var(--text); }
.upload-area input { display: none; }
#file-editor-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; }
#file-editor-overlay.show { display: flex; }
.editor-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 700px; max-width: 90vw; max-height: 80vh; display: flex; flex-direction: column; }
.editor-card .header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.editor-card .header span { font-size: 14px; font-weight: 600; }
.editor-card .header button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; }
.editor-card textarea { flex: 1; padding: 16px; background: var(--bg); color: var(--text); border: none; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; resize: none; outline: none; min-height: 400px; }
.editor-card .footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.editor-card .footer button { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
.editor-card .footer .save { background: var(--accent); color: white; border: none; }
.editor-card .footer .cancel { background: transparent; color: var(--text2); border: 1px solid var(--border); }

/* ─── Terminal ──────────────── */
.terminal-container { background: #000; border-radius: var(--radius-lg); overflow: hidden; height: calc(100vh - 140px); }
.terminal-container .xterm { padding: 8px; height: 100%; }

/* ─── Toast ─────────────────── */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 16px; border-radius: var(--radius); font-size: 13px; color: white; animation: slideIn .3s ease; max-width: 360px; }
.toast.success { background: #166534; }
.toast.error   { background: #991b1b; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ─── Loading ───────────────── */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Empty state ──────────── */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
</style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <h1>⚡ VPSphere</h1>
    <p>Sign in to your server dashboard</p>
    <input type="password" id="login-password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Sign In</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<!-- ====== APP ====== -->
<div id="app-layout" class="app-layout" style="display:none">
  <aside class="sidebar">
    <div class="logo"><span>V</span> VPSphere</div>
    <nav>
      <a data-panel="dashboard" class="active" onclick="switchPanel('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a data-panel="files" onclick="switchPanel('files')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Files
      </a>
      <a data-panel="terminal" onclick="switchPanel('terminal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        Terminal
      </a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="logout()">Log out</button>
    </div>
  </aside>

  <main class="main-content">

    <!-- Dashboard Panel -->
    <div id="panel-dashboard" class="panel active">
      <div class="dashboard-header">
        <h2>Overview</h2>
        <span id="dashboard-time"></span>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="spinner"></div> Loading...</div>
      </div>
    </div>

    <!-- Files Panel -->
    <div id="panel-files" class="panel">
      <div class="files-toolbar">
        <button onclick="fileNewFolder()">📁 New Folder</button>
        <button onclick="fileUpload()">⬆ Upload</button>
        <button class="danger" onclick="fileDelete()" id="btn-delete" disabled>🗑 Delete</button>
        <div class="spacer"></div>
        <input type="text" id="file-search" placeholder="Search..." style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;width:200px" oninput="fileSearch()">
        <button onclick="location.reload()">↻ Refresh</button>
      </div>
      <div class="files-breadcrumb" id="files-breadcrumb"></div>
      <table class="files-table">
        <thead><tr><th style="width:32px"></th><th>Name</th><th style="width:100px">Size</th><th style="width:180px">Modified</th><th style="width:100px">Perms</th></tr></thead>
        <tbody id="files-list"></tbody>
      </table>
      <div class="upload-area" id="upload-drop" onclick="document.getElementById('upload-input').click()">
        <div>📤 Drop files here or click to upload</div>
        <input type="file" id="upload-input" multiple onchange="handleUpload(this.files)">
      </div>
    </div>

    <!-- Terminal Panel -->
    <div id="panel-terminal" class="panel">
      <div class="terminal-container" id="terminal-container"></div>
    </div>

  </main>
</div>

<!-- File Editor Overlay -->
<div id="file-editor-overlay">
  <div class="editor-card">
    <div class="header"><span id="editor-title">Edit File</span><button onclick="closeEditor()">✕</button></div>
    <textarea id="editor-textarea" spellcheck="false"></textarea>
    <div class="footer">
      <button class="cancel" onclick="closeEditor()">Cancel</button>
      <button class="save" onclick="saveEditor()">Save</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
